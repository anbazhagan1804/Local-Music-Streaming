services:
  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    container_name: musicstream-api
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "4000:4000"
    volumes:
      - musicstream_data:/data
      - ${MUSIC_LIBRARY_HOST_PATH:-./music}:/music
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:4000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  web:
    build:
      context: .
      dockerfile: web/Dockerfile
    container_name: musicstream-web
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "8080:80"

volumes:
  musicstream_data:


